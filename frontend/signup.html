<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="signup.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Sign Up</title>
  </head>
  <body>
    <div class="signup-container">
        <h3 class="text-center">Sign up for FinApp</h3>
        <hr />
        <form method="POST" class="form-group">
          <label for="email">Email</label>
          <input required
            class="user-input"
            type="email"
            id="email"
            placeholder="Enter email"
          />
          <label for="password">Password</label>
          <input required
            class="user-input"
            type="password"
            id="password"
            placeholder="Enter password"
          />
          <spam class="password-toggle-icon"
            ><i class="fas fa-eye field-icon" onclick="viewPassword()"></i
          ></spam>
          <label for="password">Repeat password</label>
          <input required
            class="user-input"
            type="password"
            id="rep-password"
            placeholder="Enter password"
          />
          <spam class="rep-password-toggle-icon"
            ><i class="fas fa-eye field-icon" onclick="viewPassword()"></i
          ></spam>
          <div class="password-checklist">
            <spam class="password-same" id="password-same">
              <i class="bi bi-x-lg"></i>Passwords do not match
            </spam>
            <spam class="password-length" id="password-length">
              <i class="bi bi-x-lg"></i>At least 8 characters long
            </spam>
          </div>
            <button type="submit" class="signup-btn" id="signup-btn" disabled>Sign Up</button>
        </form>
    </div>
    <script src="signup.js"></script>
  </body>
</html>
