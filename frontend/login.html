<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="login.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>FinApp</title>
  </head>
  <body>
    <div class="login-container">
      <h2 class="text-center">FinApp</h2>
      <hr />
      <p class="text-center">🔑 Login with email</p>
      <form method="POST" class="form-group">
        <label for="email">Email</label>
        <input
          class="user-input"
          type="email"
          id="email"
          placeholder="Enter email"
        />
        <label for="password">Password</label>
        <a href="#" class="forgot-password">Forgot?</a>
        <input
          class="user-input"
          type="password"
          id="password"
          placeholder="Enter password"
        />
        <spam class="password-toggle-icon"
          ><i class="fas fa-eye field-icon"></i
        ></spam>
          <button type="submit" class="login-btn">Login</button>
      </form>
      <p class="text-center mt-3">
        Not a member? <a href="signup.html">Sign up now</a>
      </p>
    </div>
    <script src="login.js"></script>
  </body>
</html>
